<!DOCTYPE html>
<html>
<head>
  <title>Mini Messenger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loader-overlay" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #ffffff; /* Цвет фона под твой дизайн */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  ">
  <div class="spinner">Загрузка...</div> 
  </div>
  
  <div class="auth-container">

    <h1>BWBGRAMM</h1>

    <div id="registerBox">
      <input id="email" placeholder="Email">
      <input id="password" type="password" placeholder="Пароль">
      <input id="username" placeholder="Username">
      <button onclick="register()">Создать аккаунт</button>
      <p class="switch-text" onclick="showLogin()">Есть аккаунт?</p>
    </div>

    <div id="loginBox" style="display:none;">
      <input id="loginEmail" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Пароль">
      <button onclick="login()">Войти</button>
      <p class="switch-text" onclick="showRegister()">Создать аккаунт</p>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
